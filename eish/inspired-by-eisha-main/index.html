// SECURE DATABASE LAYER
// ═══════════════════════════════════════
class SecureDB {
  constructor(encKey = 'eisha_db_2024_secure') {
    this._key = encKey;
    this._cache = {};
  }

  _encode(data) {
    try {
      const json = JSON.stringify(data);
      const encoded = btoa(unescape(encodeURIComponent(json)));
      let result = '';
      for (let i = 0; i < encoded.length; i++) {
        result += String.fromCharCode(encoded.charCodeAt(i) ^ this._key.charCodeAt(i % this._key.length));
      }
      return btoa(result);
    } catch(e) { return null; }
  }

  _decode(str) {
    try {
      const decoded = atob(str);
      let result = '';
      for (let i = 0; i < decoded.length; i++) {
        result += String.fromCharCode(decoded.charCodeAt(i) ^ this._key.charCodeAt(i % this._key.length));
      }
      return JSON.parse(decodeURIComponent(escape(atob(result))));
    } catch(e) { return null; }
  }

  get(key, fallback = null) {
    if (this._cache[key] !== undefined) return this._cache[key];
    try {
      const raw = localStorage.getItem('sdb_' + key);
      if (!raw) return fallback;
      const data = this._decode(raw);
      if (data === null) {
        const plain = JSON.parse(raw);
        if (plain !== null) { this.set(key, plain); return plain; }
        return fallback;
      }
      this._cache[key] = data;
      return data;
    } catch(e) {
      try {
        const old = localStorage.getItem(key);
        if (old) {
          const parsed = JSON.parse(old);
          this.set(key, parsed);
          localStorage.removeItem(key);
          return parsed;
        }
      } catch(e2) {}
      return fallback;
    }
  }

  set(key, value) {
    this._cache[key] = value;
    const encoded = this._encode(value);
    if (encoded) localStorage.setItem('sdb_' + key, encoded);
  }

  remove(key) {
    delete this._cache[key];
    localStorage.removeItem('sdb_' + key);
    localStorage.removeItem(key);
  }

  clear() {
    this._cache = {};
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('sdb_')) keys.push(k);
    }
    keys.forEach(k => localStorage.removeItem(k));
  }

  exportBackup() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('sdb_')) {
        data[k.replace('sdb_', '')] = this.get(k.replace('sdb_', ''));
      }
    }
    return JSON.stringify(data, null, 2);
  }

  importBackup(jsonStr) {
    try {
      const data = JSON.parse(jsonStr);
      Object.keys(data).forEach(k => this.set(k, data[k]));
      return true;
    } catch(e) { return false; }
  }
}

const sanitize = (str) => {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
};

async function hashPassword(pw) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pw + '_eisha_salt_2024');
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePhone(phone) {
  return /^[\d\s\+\-()]{7,15}$/.test(phone);
}

// ═══ TOAST NOTIFICATION ═══
function toast(msg, type = 'info') {
  const el = document.getElementById('toast-el');
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════
function addToCart(id){
  const p=prods.find(x=>x.id===id);if(!p||p.stock<1||!p.on)return;
  const hasOpts=(p.showColors&&p.colors?.length)||(p.showSizes&&p.sizes?.length)||p.showGift;
  if(hasOpts){openDetail(id);return}
  const existing=cart.find(c=>c.id===id&&!c.selColor&&!c.selSize);
  if(existing){
    if(existing.qty<p.stock){existing.qty++;sv('cart');R()}
    else toast(L==='ar'?'الكمية المتاحة غير كافية':'Not enough stock','error');
    return;
  }
  cart.push({...p,qty:1,selColor:'',selSize:'',giftMsg:''});sv('cart');R();
  toast(L==='ar'?'تمت الإضافة للسلة':'Added to cart','success');
}
function openDetail(id){const p=prods.find(x=>x.id===id);if(!p)return;detailProd=p;selColor=p.colors?.length?p.colors[0]:'';selSize=p.sizes?.length?p.sizes[0]:'';giftMsg='';isGift=false;R()}
function closeDetail(){detailProd=null;R()}
function pickColor(c){selColor=c;R()}
function pickSize(s){selSize=s;R()}
function confirmAdd(){
  if(!detailProd)return;
  if(detailProd.showColors&&detailProd.colors?.length&&!selColor){toast(t('optSelectColor'),'error');return}
  if(detailProd.showSizes&&detailProd.sizes?.length&&!selSize){toast(t('optSelectSize'),'error');return}
  const existing=cart.find(c=>c.id===detailProd.id&&c.selColor===selColor&&c.selSize===selSize);
  if(existing){existing.qty++;sv('cart');}
  else{cart.push({...detailProd,qty:1,selColor,selSize,giftMsg:isGift?giftMsg:''});sv('cart');}
  detailProd=null;R();
  toast(L==='ar'?'تمت الإضافة للسلة':'Added to cart','success');
}
function rmCart(i){cart.splice(i,1);sv('cart');R()}
function updateQty(i,delta){
  const item=cart[i];if(!item)return;
  const p=prods.find(x=>x.id===item.id);
  const newQty=item.qty+delta;
  if(newQty<1){rmCart(i);return}
  if(p&&newQty>p.stock){toast(L==='ar'?'الكمية المتاحة غير كافية':'Not enough stock','error');return}
  item.qty=newQty;sv('cart');R();
}

function calcShip(){
  if(!selZone)return 0;
  const z=zones.find(x=>x.name===selZone||x.en===selZone);
  const isFar=z&&z.type==='far';
  const sub=cart.reduce((a,c)=>a+c.price*c.qty,0);
  if(sub>=dlvr.freeAbove)return 0;
  return isFar?dlvr.farPrice:dlvr.closePrice;
}

    if(data.success&&data.paymentUrl){
      // Save pending order — stock deducted ONLY after payment success
      pendingOrder.id=data.invoiceId||ordId;
      db.set('pendingOrder', pendingOrder);

      // Deduct stock NOW but save cart for restoration on failure
      db.set('pendingCart', cart);
      cart.forEach(ci=>{const p=prods.find(x=>x.id===ci.id);if(p&&p.stock>=ci.qty)p.stock-=ci.qty});
      sv('prods');

      orders.push(pendingOrder);sv('orders');
      cart=[];sv('cart');appliedCoupon=null;
      window.location.href=data.paymentUrl;
    }else{
      const errMsg=data.error||(L==='ar'?'فشل الدفع. حاول مرة أخرى':'Payment failed. Please try again');
      if(errBox){errBox.textContent=errMsg;errBox.style.display='block'}
      if(payBtn){payBtn.innerHTML=t('pay')+' '+total+' '+t('qar');payBtn.disabled=false;payBtn.style.opacity='1'}
    }
  }catch(e){
    const errMsg=L==='ar'?'خطأ في الاتصال بالخادم. حاول مرة أخرى':'Connection error. Please try again';
    if(errBox){errBox.textContent=errMsg;errBox.style.display='block'}else{toast(errMsg,'error')}
    if(payBtn){payBtn.innerHTML=t('pay')+' '+total+' '+t('qar');payBtn.disabled=false;payBtn.style.opacity='1'}
  }
}

// Restore cart if payment failed (called on page load)
function checkPaymentFailure(){
  const pending=db.get('pendingOrder');
  const pendingCart=db.get('pendingCart');
  if(pending&&pendingCart&&window.location.search.includes('payment_failed')){
    // Restore stock
    pendingCart.forEach(ci=>{const p=prods.find(x=>x.id===ci.id);if(p)p.stock+=ci.qty});
    sv('prods');
    // Remove failed order
    orders=orders.filter(o=>o.id!==pending.id);sv('orders');
    // Restore cart
    cart=pendingCart;sv('cart');
    db.remove('pendingOrder');db.remove('pendingCart');
    toast(L==='ar'?'فشل الدفع — تم استعادة سلتك':'Payment failed — cart restored','error');
  } else {
    db.remove('pendingOrder');db.remove('pendingCart');
  }
}

function parseOrderDate(o){
  if(o.ts) return new Date(o.ts);
  // Try ISO format first
  if(o.date&&o.date.includes('-')){const d=new Date(o.date);if(!isNaN(d.getTime()))return d}
  // Parse "Apr 7" style dates with year detection
  if(o.date){
    const now=new Date();
    const d=new Date(o.date+', '+now.getFullYear());
    if(!isNaN(d.getTime())){
      // If the date is in the future, it's probably from last year
      if(d>now){d.setFullYear(d.getFullYear()-1)}
      return d;
    }
  }
  return new Date();
}

function getFilteredOrders(period){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return orders.filter(o=>{
    const d=parseOrderDate(o);
    if(period==='daily') return d>=today;
    if(period==='weekly'){const w=new Date(today);w.setDate(w.getDate()-7);return d>=w;}
    if(period==='monthly'){const m=new Date(today);m.setMonth(m.getMonth()-1);return d>=m;}
    if(period==='yearly'){const y=new Date(today);y.setFullYear(y.getFullYear()-1);return d>=y;}
    return true;
  });
}

function getPrevFilteredOrders(period){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let start,end;
  if(period==='daily'){end=new Date(today);start=new Date(today);start.setDate(start.getDate()-1);}
  else if(period==='weekly'){end=new Date(today);end.setDate(end.getDate()-7);start=new Date(end);start.setDate(start.getDate()-7);}
  else if(period==='monthly'){end=new Date(today);end.setMonth(end.getMonth()-1);start=new Date(end);start.setMonth(start.getMonth()-1);}
  else{end=new Date(today);end.setFullYear(end.getFullYear()-1);start=new Date(end);start.setFullYear(start.getFullYear()-1);}
  return orders.filter(o=>{const d=parseOrderDate(o);return d>=start&&d<end;});
}

function calcGrowth(curr,prev){
  if(prev===0&&curr===0)return 0;
  if(prev===0)return 100;
  return Math.round(((curr-prev)/prev)*100);
}

  const sub={dash:rADash,fin:rAFin,ords:rAOrds,bnr:rABnr,prods:rAProds,addp:rAAddP,stk:rAStk,cats:rACats,pays:rAPays,dlvr:rADlvr,pay:rAPayS,ig:rAIG,coup:rACoup,custs:rACusts,dbm:rADBM,reset:rAReset};
  return`<div style="padding-bottom:16px"><div class="hd"><div><div class="tt">🔐 ${t('adm')}</div><div style="font-size:10px;color:#8A8580">👤 ${ADM_U}</div></div><div style="display:flex;gap:6px;align-items:center">${rLT()}<button onclick="admOut()" style="padding:4px 10px;border-radius:12px;border:1px solid #EF444430;background:#FEF2F2;font-size:10px;font-weight:600;cursor:pointer;color:#EF4444">${t('admO')}</button></div></div>${(sub[ap]||rADash)()}</div>`}

function rDetail(){
  if(!detailProd)return'';
  const p=detailProd;const d=L==='ar'?'right':'left';const fav=isFav(p.id);
  return`<div class="ov" onclick="closeDetail()" style="z-index:160"><div class="os fu" onclick="event.stopPropagation()" style="padding:0;max-height:85vh">
  <div style="height:220px;background:linear-gradient(135deg,#F5F0EA,#EDE8E1);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;overflow:hidden;border-radius:28px 28px 0 0">${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover"/>`:p.img}
    <button onclick="closeDetail()" style="position:absolute;top:14px;${d}:14px;width:32px;height:32px;border-radius:16px;background:rgba(0,0,0,.4);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">✕</button>
    <button onclick="tgFav(${p.id});R()" style="position:absolute;top:14px;${L==='ar'?'left':'right'}:14px;width:32px;height:32px;border-radius:16px;background:rgba(255,255,255,.85);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">${fav?'❤️':'🤍'}</button>
    ${p.stock<=3?`<div style="position:absolute;bottom:12px;${d}:12px;padding:4px 12px;border-radius:8px;background:rgba(239,68,68,.9);font-size:11px;font-weight:700;color:#fff">${L==='ar'?'آخر '+p.stock+' قطع':'Only '+p.stock+' left'}</div>`:''}
  </div>
  <div style="padding:20px 22px 28px">
    <div style="display:flex;align-items:center;gap:6px"><span style="padding:3px 8px;border-radius:6px;background:#F5F0EA;font-size:9px;font-weight:600;color:#8A8580">${cn(cats.find(c=>c.k===p.cat)||cats[0])}</span><span style="font-size:10px;color:#E8A838">★ ${p.r}</span><span style="font-size:10px;color:#8A8580">(${p.rv} ${t('rev')})</span></div>
    <div style="font-size:18px;font-weight:700;line-height:1.3;margin-top:8px">${pn(p)}</div>
    ${pd(p)?`<div style="font-size:12px;color:#8A8580;margin-top:4px;line-height:1.5">${pd(p)}</div>`:''}
    <div style="font-size:22px;font-weight:800;color:#C8956C;margin-top:10px">${p.price} <span style="font-size:12px;font-weight:500;color:#8A8580">${t('qar')}</span></div>
    ${p.showColors&&p.colors?.length?`<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">🎨 ${t('optColor')}</div><div style="display:flex;gap:8px;flex-wrap:wrap">${p.colors.map(c=>`<div onclick="pickColor('${c}')" style="width:36px;height:36px;border-radius:18px;background:${c};cursor:pointer;border:3px solid ${selColor===c?'#C8956C':'#EDE8E1'};box-shadow:${selColor===c?'0 0 0 2px #C8956C':'none'};transition:all .2s"></div>`).join('')}</div></div>`:''}
    ${p.showSizes&&p.sizes?.length?`<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">📏 ${t('optSize')}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${p.sizes.map(s=>`<button onclick="pickSize('${s}')" style="padding:8px 18px;border-radius:12px;border:2px solid ${selSize===s?'#C8956C':'#EDE8E1'};background:${selSize===s?'#C8956C15':'#fff'};color:${selSize===s?'#C8956C':'#8A8580'};font-size:13px;font-weight:600;cursor:pointer;transition:all .2s">${s}</button>`).join('')}</div></div>`:''}
    ${p.showGift?`<div style="margin-top:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:12px;font-weight:700">🎁 ${t('optGift')}</span><button onclick="isGift=!isGift;R()" style="padding:4px 12px;border-radius:10px;border:1.5px solid ${isGift?'#C8956C':'#EDE8E1'};background:${isGift?'#C8956C15':'#fff'};color:${isGift?'#C8956C':'#8A8580'};font-size:11px;font-weight:600;cursor:pointer">${isGift?'✓ ':''} ${isGift?(L==='ar'?'مفعّل':'On'):(L==='ar'?'إضافة':'Add')}</button></div>${isGift?`<textarea class="ta" onchange="giftMsg=this.value" placeholder="${t('optGiftHint')}" style="min-height:60px;font-size:13px">${giftMsg}</textarea>`:''}</div>`:''}
    <button onclick="confirmAdd()" class="bp" style="margin-top:20px">${t('optAddToCart')} — ${p.price} ${t('qar')}</button>
  </div></div></div>`}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function R(){
  const pages={home:rShop,cart:rCart,orders:rOrd,acc:rAcc,admin:rAdmin,fav:rFav};
  document.getElementById('app').innerHTML=(pages[pg]||rShop)()+rNav()+rAS()+rAL()+rDetail();
  if(showAL){const i=document.getElementById('al-u');i&&i.focus()}
  if(pg==='home')setTimeout(initSlider,50);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.body.dir=L==='ar'?'rtl':'ltr';
checkPaymentFailure();
R();
</script>
</body>
