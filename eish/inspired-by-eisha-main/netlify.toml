[build]
  publish = "."
  functions = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.myfatoorah.com"

# Serve Apple Pay verification file
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "text/plain"

# Don't redirect real files
[[redirects]]
  from = "/payment-success.html"
  to = "/payment-success.html"
  status = 200

[[redirects]]
  from = "/payment-error.html"
  to = "/payment-error.html"
  status = 200

[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
