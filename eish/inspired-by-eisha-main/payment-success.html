<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<title>تم الدفع بنجاح</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal','DM Sans',sans-serif;background:#FCFBF9;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:#22201D;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.box{background:#fff;border-radius:28px;padding:44px 32px;max-width:440px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.04), 0 2px 10px rgba(0,0,0,.02);border:1px solid rgba(234,229,222,.6)}
.ic{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#F0FDF4,#FFF);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 24px;animation:pop .6s cubic-bezier(0.16, 1, 0.3, 1) both;box-shadow:inset 0 2px 10px rgba(91,154,111,.05), 0 4px 14px rgba(91,154,111,.1)}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.check{width:54px;height:54px;border-radius:50%;background:#5B9A6F;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(91,154,111,.3)}
.check svg{width:30px;height:30px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:26px;font-weight:700;margin-bottom:8px;color:#22201D}
.sub{color:#7A7570;font-size:15px;line-height:1.6}
.info{margin-top:24px;padding:20px;border-radius:18px;background:#F9F8F6;text-align:right;border:1px solid #EAE5DE}
.info div{font-size:13px;color:#7A7570;padding:6px 0;display:flex;justify-content:space-between;border-bottom:1px dashed #EAE5DE}
.info div:last-child{border-bottom:none;padding-bottom:0}
.info div:first-child{padding-top:0}
.info div span:last-child{color:#22201D;font-weight:700}
.btn{display:inline-block;width:100%;margin-top:28px;padding:16px 0;border-radius:24px;background:#22201D;color:#fff;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s cubic-bezier(0.16, 1, 0.3, 1);box-shadow:0 6px 18px rgba(0,0,0,.15)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.btn:active{transform:translateY(0);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn2{display:inline-block;width:100%;margin-top:12px;padding:14px 0;border-radius:24px;background:transparent;color:#C8956C;text-decoration:none;font-weight:600;font-size:14px;border:1.5px solid #C8956C;transition:all .2s}
.btn2:hover{background:rgba(200,149,108,.05)}
</style>
</head>
<body>
<div class="box">
  <div class="ic"><div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div></div>
  <h1>تم الدفع بنجاح!</h1>
  <p class="sub">شكراً لك! تم استلام طلبك وسيتم التواصل معك قريباً</p>
  <p style="color:#8A8580;font-size:13px;margin-top:6px">Payment Successful! Thank you for your order.</p>
  <div id="order-info" class="info" style="display:none"></div>
  <a href="/" class="btn">العودة للمتجر — Back to Shop</a>
  <br/>
  <a href="/" class="btn2" onclick="try{localStorage.setItem('pg','orders')}catch(e){}">تتبع الطلب — Track Order</a>
</div>
<script>
// Clean up pending order data on success
try {
  const keys = Object.keys(localStorage);
  keys.filter(k => k.includes('pendingOrder') || k.includes('pendingCart')).forEach(k => localStorage.removeItem(k));
} catch(e) {}

// Parse payment ID from URL
const params = new URLSearchParams(window.location.search);
const paymentId = params.get('paymentId') || params.get('Id') || '';
if(paymentId){
  const info = document.getElementById('order-info');
  if(info){
    info.style.display='block';
    info.innerHTML='<div><span>رقم العملية — Transaction</span><span>#'+paymentId+'</span></div><div><span>الحالة — Status</span><span style="color:#5B9A6F">✓ مدفوع — Paid</span></div>';
  }
}
</script>
</body>
</html>
