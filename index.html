  const ordId='INS-'+Date.now().toString(36).toUpperCase()+Math.floor(Math.random()*1000);
  // Show loading
  const payBtn=document.getElementById('pay-btn');
  const errBox=document.getElementById('pay-err');
  if(errBox)errBox.style.display='none';
  if(payBtn){payBtn.innerHTML='<span style="display:inline-flex;align-items:center;gap:8px">⏳ '+(L==='ar'?'جاري التحويل للدفع...':'Redirecting to payment...')+'</span>';payBtn.disabled=true;payBtn.style.opacity='.7'}
  try{
    const res=await fetch('/.netlify/functions/create-payment',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({amount:total,customerName:cName,customerPhone:cu?cu.phone:(gi?gi.phone:''),customerEmail:cu?cu.email:'',orderRef:ordId,notes:oNotes,items:cart.map(c=>({name:pn(c),price:c.price,qty:1}))})
    });
    const data=await res.json();
    if(data.success&&data.paymentUrl){
      // Update stock
      cart.forEach(ci=>{const p=prods.find(x=>x.id===ci.id);if(p&&p.stock>0)p.stock--});SS('prods',prods);
      // Save order
      const ord={id:data.invoiceId||ordId,items:cart.map(c=>({id:c.id,nm:pn(c),pr:c.price})),total,ship,zone:selZone,dlvrType:selType,status:'prc',date:new Date().toLocaleDateString('en',{month:'short',day:'numeric'}),cust:cName,phone:cu?cu.phone:(gi?gi.phone:''),notes:oNotes};
      orders.push(ord);SS('orders',orders);
      cart=[];SS('cart',cart);
      // Redirect to MyFatoorah
      window.location.href=data.paymentUrl;
    }else{
      const errMsg=data.error||(L==='ar'?'فشل الدفع. حاول مرة أخرى':'Payment failed. Please try again');
      if(errBox){errBox.textContent=errMsg;errBox.style.display='block'}
      if(payBtn){payBtn.innerHTML=t('pay')+' '+total+' '+t('qar');payBtn.disabled=false;payBtn.style.opacity='1'}
    }
  }catch(e){
    const errMsg=L==='ar'?'خطأ في الاتصال بالخادم. حاول مرة أخرى':'Connection error. Please try again';
    if(errBox){errBox.textContent=errMsg;errBox.style.display='block'}else{alert(errMsg)}
    if(payBtn){payBtn.innerHTML=t('pay')+' '+total+' '+t('qar');payBtn.disabled=false;payBtn.style.opacity='1'}
  }
}

  <div class="c" style="padding:12px;margin-top:8px;border:2px dashed #EDE8E1"><div style="font-size:11px;font-weight:700;margin-bottom:8px">+ ${t('addZone')}</div><div style="display:flex;gap:6px"><input class="i" id="nz-nm" placeholder="${t('zoneName')}" style="flex:1;padding:8px 10px;font-size:12px"/><input class="i" id="nz-en" placeholder="${t('zoneEn')}" dir="ltr" style="flex:1;padding:8px 10px;font-size:12px"/><select class="i" id="nz-tp" style="width:70px;padding:8px;font-size:11px"><option value="close">${t('close')}</option><option value="far">${t('far')}</option></select><button class="bp" onclick="addZone()" style="width:auto;padding:8px 14px;font-size:11px">+</button></div></div></div>`}

function rAIG(){
  return`${rANav()}<div style="padding:0 12px"><div style="font-size:14px;font-weight:700;margin-bottom:12px">📷 Instagram</div><div style="display:flex;flex-direction:column;gap:10px"><input class="i" id="ig-a" placeholder="@inspired.by.eisha" dir="ltr" value="${stg.igAcc||'@inspired.by.eisha'}"/><input class="i" id="ig-l" placeholder="https://instagram.com/..." dir="ltr" value="${stg.igLink||'https://www.instagram.com/inspired.by.eisha'}"/><button class="bp" onclick="svIG()">${t('save')}</button></div></div>`}

  return`<div style="padding-bottom:16px"><div class="hd"><div><div class="tt">🔐 ${t('adm')}</div><div style="font-size:10px;color:#8A8580">👤 ${ADM_U}</div></div><div style="display:flex;gap:6px;align-items:center">${rLT()}<button onclick="admOut()" style="padding:4px 10px;border-radius:12px;border:1px solid #EF444430;background:#FEF2F2;font-size:10px;font-weight:600;cursor:pointer;color:#EF4444">${t('admO')}</button></div></div>${(sub[ap]||rADash)()}</div>`}
