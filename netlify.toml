[build]
  publish = "."
  functions = "netlify/functions"

# Serve Apple Pay verification file
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "text/plain"

# Don't redirect real files
[[redirects]]
  from = "/payment-success.html"
  to = "/payment-success.html"
  status = 200

[[redirects]]
  from = "/payment-error.html"
  to = "/payment-error.html"
  status = 200

[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
