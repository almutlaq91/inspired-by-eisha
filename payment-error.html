<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<title>فشل الدفع</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal','DM Sans',sans-serif;background:#FCFBF9;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:#22201D;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.box{background:#fff;border-radius:28px;padding:44px 32px;max-width:440px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.04), 0 2px 10px rgba(0,0,0,.02);border:1px solid rgba(234,229,222,.6)}
.ic{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#FEF2F2,#FFF);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 24px;animation:shake .5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;box-shadow:inset 0 2px 10px rgba(239,68,68,.05), 0 4px 14px rgba(239,68,68,.1)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.x{width:54px;height:54px;border-radius:50%;background:#EF4444;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(239,68,68,.3)}
.x svg{width:26px;height:26px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:26px;font-weight:700;margin-bottom:8px;color:#22201D}
.sub{color:#7A7570;font-size:15px;line-height:1.6}
.tips{margin-top:24px;padding:20px;border-radius:18px;background:#FEF2F2;text-align:right;border:1px solid rgba(239,68,68,.1)}
.tips div{font-size:13px;color:#7A7570;padding:4px 0;display:flex;align-items:center;gap:8px}
.tips div::before{content:'•';color:#EF4444;font-size:16px;font-weight:bold}
.btn{display:inline-block;width:100%;margin-top:28px;padding:16px 0;border-radius:24px;background:linear-gradient(135deg,#C8956C,#A67548);color:#fff;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s cubic-bezier(0.16, 1, 0.3, 1);box-shadow:0 6px 18px rgba(200,149,108,.25)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,149,108,.35)}
.btn:active{transform:translateY(0);box-shadow:0 4px 12px rgba(200,149,108,.25)}
.btn2{display:inline-block;width:100%;margin-top:12px;padding:14px 0;border-radius:24px;background:transparent;color:#7A7570;text-decoration:none;font-weight:600;font-size:14px;border:1.5px solid #EAE5DE;transition:all .2s}
.btn2:hover{background:#F7F5F2;color:#22201D;border-color:#D0CACA}
</style>
</head>
<body>
<div class="box">
  <div class="ic"><div class="x"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></div></div>
  <h1>فشل الدفع</h1>
  <p class="sub">عذرا، لم تتم عملية الدفع. يرجى المحاولة مرة اخرى</p>
  <p style="color:#8A8580;font-size:13px;margin-top:6px">Payment failed. Please try again.</p>
  <div class="tips">
    <div>• تاكد من صحة بيانات البطاقة</div>
    <div>• تاكد من وجود رصيد كافي</div>
    <div>• جرب طريقة دفع اخرى</div>
  </div>
  <a href="/" class="btn" onclick="localStorage.setItem('pg','cart')">حاول مرة اخرى</a>
  <br/>
  <a href="/" class="btn2">العودة للمتجر</a>
</div>
</body>
</html>
